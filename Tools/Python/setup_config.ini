[Setup]
; ============================================================
; Absolute path to the Unreal Engine directory.
; This is the "Engine" folder itself, NOT the version folder.
; Example: D:\GameDev\UE_5.7\Engine
UnrealEnginePath=D:\GameDev\UE_5.7\Engine

; ============================================================
; Absolute path to the .uproject file.
; Example: D:\Workspace\Unreal\PythonTools\PythonTools.uproject
UProjectPath=D:\Workspace\Unreal\PythonTools\PythonTools.uproject

; ============================================================
; (Optional) Name of the VS Code workspace file to create/update.
; If left empty, it defaults to the uproject name (e.g. PythonTools.code-workspace).
WorkspaceFileName=

; ============================================================
; (Optional) Additional plugin Python folders to include in the workspace.
; These are relative paths from the uproject root.
; Separate multiple entries with a semicolon.
; Example: Plugins/MyPlugin/Content/Python;Plugins/OtherPlugin/Content/Python
PluginPythonPaths=
